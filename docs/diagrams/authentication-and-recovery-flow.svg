  <path d="M635 165 L595 165" fill="none" stroke="#d4744f" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrRec)"/>

  <!-- bottom: tempmail blocker shield on the email path -->
  <rect x="640" y="260" width="140" height="70" rx="12" fill="#ffffff" stroke="#d9d4c7" stroke-width="1.5"/>
  <path d="M660 278 L660 296 Q660 310 672 316 Q684 310 684 296 L684 278 L672 274 z" fill="#f7e8df" stroke="#d4744f" stroke-width="1.5" stroke-linejoin="round"/>
