  <circle cx="672" cy="295" r="22" fill="none" stroke="#c0392b" stroke-width="3" opacity="0.8"/>
  <path d="M658 281 L686 309 M686 281 L658 309" stroke="#c0392b" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
