  <rect x="460" y="240" width="240" height="110" rx="14" fill="#ffffff" stroke="#d9d4c7" stroke-width="1.5"/>
  <rect x="460" y="240" width="240" height="28" rx="14" fill="url(#srvBot)"/>
  <rect x="460" y="254" width="240" height="14" fill="url(#srvBot)"/>
